# ML Trading Bot v2.0 — 30m timeframe
# Spec: Project Spec 30min.md (§6, §8, §9, §13 govern this file).
# Fresh-rewrite per Decision v2.36 (no v1.0 inherit-and-patch).

project:
  name:     ml-bot-30m
  root:     /nvme1/projects/trading/ml-bot-30m
  timezone: UTC

# ────────────────────────────────────────────────────────────────────
# Database — Postgres + TimescaleDB (shared with v1.0 per Decision v2.27).
# Credentials in .env. Only v2.0 tables managed here (data/db.py).
# ────────────────────────────────────────────────────────────────────
database:
  schema: public
  chunk_interval_ohlcv_30m: "90 days"   # §6.1.1
  retention_ohlcv:           null       # OHLCV is source of truth — never drop

# ────────────────────────────────────────────────────────────────────
# Splits (§9.1) — OOT is one-shot per §10.1, §10.2
# ────────────────────────────────────────────────────────────────────
splits:
  total_data_years: 3                # 3yr min per Decision v2.2 / v2.35
  train_val_end:    "2026-02-28"     # train+val ends here
  oot_start:        "2026-03-01"     # UNTOUCHED until final freeze
  oot_end:          "2026-03-31"

# ────────────────────────────────────────────────────────────────────
# Data sources (§6.1)
# ────────────────────────────────────────────────────────────────────
data:
  binance:
    market_type:   spot
    symbols:       [BTC/USDT, SOL/USDT, LINK/USDT]   # v2.0 universe per Decision v2.35
    timeframes:    [30m]                              # 30m only (Decision v2.28)
    history_years: 3                                  # §6.3
    archive_host:  "https://data.binance.vision/data/spot/monthly/klines"
    storage_dir:   data/storage/binance
  hyperliquid:
    ws_url:                   wss://api.hyperliquid.xyz/ws
    rest_url:                 https://api.hyperliquid.xyz
    coins:                    [BTC, SOL, LINK, HYPE]   # TAO deferred (Decision v2.35)
    storage_dir:              data/storage/hyperliquid
    l2_sample_interval_sec:   5
    funding_poll_interval_sec: 3600                    # Hyperliquid settles hourly
    reconnect_delay_sec:      5
    max_reconnect_delay_sec:  60

# ────────────────────────────────────────────────────────────────────
# Feature engineering (§7) — indicator periods unchanged from v1.0 math defaults;
# v2.0 changes feature SET (§7.2 deltas) not indicator parameter values.
# ────────────────────────────────────────────────────────────────────
features:
  warmup_bars: 150                   # VFI(130) is longest 30m lookback (§7.6)
  output_dir:  data/storage/features
  rsi:        { period: 14, sma_period: 14, bb_period: 14, bb_std: 2.0 }
  wavetrend:  { n1: 10, n2: 21, signal: 4, ob_level: 60, os_level: -60 }
  stochastic: { k_period: 14, k_smooth: 3, d_smooth: 3 }
  squeeze:    { bb_length: 20, bb_mult: 2.0, kc_length: 20, kc_mult: 1.5 }
  macd:       { fast: 12, slow: 26, signal: 9 }
  adx:        { period: 14, di_roc_window: 5, spread_roc_window: 3 }
  ema_periods:    [9, 21, 50]        # 30m primary (§7.2 Cat 2)
  ema_periods_4h: [9, 21, 50]        # §7.2 Cat 2a (htf4h_ema*_pos)
  ema_periods_1d: [20, 50, 200]      # §7.2 Cat 2a (htf1d_ema*_pos)
  atr:        { period: 14, short_period: 5, percentile_window: 100, roc_window: 5 }
  bb:         { period: 20, std: 2.0 }
  vfi:        { period: 130, coef: 0.2, vcoef: 2.5, signal_period: 5 }
  vwap:       { bands_window: 20 }
  pivots:     { type: fibonacci, test_tolerance_pct: 0.1 }
  cmf:        { period: 20 }
  mfi:        { period: 14 }
  williams_r: { period: 14 }
  cci:        { period: 20 }
  cmo:        { period: 14 }
  roc:        { period: 10 }
  tsi:        { long: 25, short: 13 }
  swing:      { fractal_lookback: 5 }
  hurst:      { window: 100 }
  fractal_dim: { window: 50 }
  kama:       { period: 10, fast_ema: 2, slow_ema: 30 }
  dema:       { period: 21 }
  tema:       { period: 21 }
  psar:       { af_start: 0.02, af_step: 0.02, af_max: 0.2 }
  ichimoku:   { tenkan: 9, kijun: 26, senkou_b: 52 }
  event_memory:
    rsi_ob: 70
    rsi_os: 30
    rsi_mid: 50
    stoch_ob: 80
    stoch_os: 20
    adx_trend: 25
    adx_weak:  15
    volume_spike_mult: 3.0
    swing_break_lookback: 20

# ────────────────────────────────────────────────────────────────────
# Labeling — triple-barrier (§8.1)
# ────────────────────────────────────────────────────────────────────
labeling:
  method: triple_barrier_chop_filtered  # per Decisions v2.56 + v2.59 + v2.61 + v2.64
  tp_atr_mult:                       # PER-ASSET dict (Decision v2.64 schema; values per v2.65 widening correction)
    BTC:  2.4                        # frozen at v2.61 PASS state — DO NOT perturb
    SOL:  2.5                        # DR-012: 2.2→2.5 widening per Decision v2.65 (user-correction of v2.64 misjudgment direction)
    LINK: 2.5                        # same as SOL initially
  sl_atr_mult:                       # PER-ASSET dict (symmetric with tp)
    BTC:  2.4                        # frozen at v2.61 PASS
    SOL:  2.5                        # DR-012: 2.2→2.5 widening per Decision v2.65
    LINK: 2.5
  max_holding_bars: 12               # DR-009: 8→12 per Decision v2.61 (4hr → 6hr structural extension; cascades to walk_forward purge_bars + embargo_bars)
  min_profit_pct:                    # timeout-gate only (§8.1)
    BTC:  0.3                        # LOWERED 0.6→0.3 per DR-007
    SOL:  0.4                        # LOWERED 0.9→0.4 per DR-007
    LINK: 0.4                        # LOWERED 0.8→0.4 per DR-007
    # TAO/HYPE deferred per Decision v2.35
  min_atr_pct_threshold:             # CHOP FILTER (per DR-007 / Decision v2.56)
    BTC:  0.275                      # DR-009: 0.25→0.275 per Decision v2.61 (PASSED v2.61 BTC build)
    SOL:  0.60                       # DR-010: 0.30→0.60 per Decision v2.62 (alt empirical recalibration; SOL ATR/Price profile higher than BTC)
    LINK: 0.60                       # DR-010: 0.30→0.60 per Decision v2.62 (same as SOL initially; differentiate in DR-011 if LINK off-band)
    # TAO/HYPE deferred per Decision v2.35
  classes:
    LONG:           0
    SHORT:          1
    NEUTRAL:        2
    # CHOP_FILTERED = -2 (per Decision v2.56) and UNLABELABLE = -1 are sentinels
    # not in classes dict; emitted directly by labeler. Builder filter:
    # label.isin({0, 1, 2}) excludes both at training/inference time.

# ────────────────────────────────────────────────────────────────────
# Model — LightGBM 3-class (§9.3)
# ────────────────────────────────────────────────────────────────────
model:
  framework: lightgbm
  params:
    objective:         multiclass
    num_class:         3
    metric:            multi_logloss
    boosting_type:     gbdt
    num_leaves:        63
    learning_rate:     0.05
    feature_fraction:  0.8
    bagging_fraction:  0.8
    bagging_freq:      5
    min_child_samples: 50
    lambda_l1:         0.1
    lambda_l2:         0.1
    verbose:           -1
    n_jobs:            -1
    seed:              42
  num_boost_round:       1000
  early_stopping_rounds: 50
  calibration:           sigmoid     # Platt scaling on val fold (§9.3)
  signal_threshold:      0.65        # P > 0.65 to trade (§12.1)

# ────────────────────────────────────────────────────────────────────
# Walk-forward (§9.2)
# ────────────────────────────────────────────────────────────────────
walk_forward:
  train_months: 9
  val_months:   1
  step_months:  1
  purge_bars:   12                   # = max_holding_bars per §9.2 cascade contract (DR-009 8→12)
  embargo_bars: 12                   # = max_holding_bars per §9.2 cascade contract (DR-009 8→12)

# ────────────────────────────────────────────────────────────────────
# Optuna tuning (§9.4)
# ────────────────────────────────────────────────────────────────────
tuning:
  n_trials:              50
  timeout_sec:           14400
  tuning_fold_indices:   [1, 7, 13]  # evenly across ~14 folds
  pruner_n_warmup_steps: 1
  seed:                  42
  direction:             minimize    # multi_logloss
  search_space:
    num_leaves:        [31, 127]
    learning_rate:     [0.01, 0.1]   # log-scale
    feature_fraction:  [0.5, 1.0]
    bagging_fraction:  [0.5, 1.0]
    min_child_samples: [20, 100]
    lambda_l1:         [0.001, 10.0] # log-scale
    lambda_l2:         [0.001, 10.0] # log-scale

# ────────────────────────────────────────────────────────────────────
# Risk (§13)
# ────────────────────────────────────────────────────────────────────
risk:
  max_risk_per_trade_pct:   1.0      # tightened from v1.0 2% per Decision v2.16
  max_position_size_pct:    10.0
  max_daily_loss_pct:       5.0
  max_concurrent_positions: 1        # per symbol
  trail_atr_mult:           2.0

# ────────────────────────────────────────────────────────────────────
# Fees (§11.1) — Hyperliquid taker 3.5 bps; HYPE 0 maker
# ────────────────────────────────────────────────────────────────────
fees:
  default:      { taker: 0.00035, maker: 0.00010 }
  HYPE:         { taker: 0.00035, maker: 0.00000 }
  slippage_pct: 0.0002

# ────────────────────────────────────────────────────────────────────
# Logging — used by utils/logging_setup.py
# ────────────────────────────────────────────────────────────────────
logging:
  level:     INFO
  dir:       logs
  rotation:  100 MB
  retention: 30 days
